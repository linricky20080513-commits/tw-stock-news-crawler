name: Daily crawl & publish

on:
  schedule:
    # 每天 09:00 UTC = 台北時間 17:00 (TW 收盤後,涵蓋前一夜美股)
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # 允許在 Actions 頁面手動觸發

# 讓 workflow 能 push 回 main (進而觸發 GitHub Pages 重建)
permissions:
  contents: write

# 同一時間只跑一個,避免重疊 push 衝突
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Crawl TW market
        run: python run.py
        continue-on-error: true   # 單一市場失敗不擋另一個

      - name: Crawl US market
        run: python run.py --market us
        continue-on-error: true

      # AI 重點整理(B 階段):只有設定了 ANTHROPIC_API_KEY secret 時才會執行。
      # 未設定金鑰時整個 step 跳過,看板自動退回規則式重點,一切照常。
      - name: AI summary (optional)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 想省錢可在 repo variables 設 SUMMARY_MODEL=claude-haiku-4-5
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL }}
        run: |
          python -m pip install anthropic
          python -m crawler.summarize
        continue-on-error: true

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/news.json data/news_us.json data/stocks.json
          [ -f data/summary.json ] && git add -f data/summary.json || true
          if git diff --cached --quiet; then
            echo "資料無變化,略過 commit。"
          else
            git commit -m "chore: daily crawl update ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
            echo "已推送更新資料。"
          fi
