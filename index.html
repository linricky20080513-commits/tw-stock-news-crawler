<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台股新聞 · 行情日報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  @property --hue { syntax: "<number>"; inherits: true; initial-value: 0; }
  :root {
    --hue: 0;
    --text: #eafbff;
    --muted: #7ea6c2;
    --n1: hsl(var(--hue) 100% 64%);
    --n2: hsl(calc(var(--hue) + 80) 100% 65%);
    --n3: hsl(calc(var(--hue) + 180) 100% 66%);
    --glow: hsl(var(--hue) 100% 55%);
    --danger: #ff2d6b;
    --font-head: "Noto Sans TC", sans-serif;
    --font-latin: "Orbitron", "Noto Sans TC", sans-serif;
    --font-serif: "Noto Sans TC", sans-serif;
    --font-mono: "Share Tech Mono", ui-monospace, monospace;
  }
  body.fx-neon { animation: huecycle 1.5s linear infinite; }
  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    margin: 0; min-height: 100vh; overflow-x: hidden;
    background: #05030c; color: var(--text); font-family: var(--font-serif); line-height: 1.55;
  }
  ::selection { background: var(--n2); color: #04020a; }

  /* 背景三層：霓虹光暈、掃描網格、掃描線 */
  .bg-glow, .bg-grid, .bg-scan { position: fixed; inset: 0; pointer-events: none; }
  .bg-glow {
    z-index: -3; filter: blur(55px) saturate(1.5); opacity: .95;
    background:
      radial-gradient(40% 48% at 16% 14%, hsl(var(--hue) 100% 55% / 1), transparent 68%),
      radial-gradient(44% 52% at 86% 18%, hsl(calc(var(--hue) + 110) 100% 55% / .95), transparent 68%),
      radial-gradient(52% 58% at 50% 104%, hsl(calc(var(--hue) + 220) 100% 55% / .95), transparent 68%);
    animation: blob 8s ease-in-out infinite, glowflash 1.3s ease-in-out infinite;
  }
  .bg-grid {
    z-index: -2; opacity: .5;
    background-image:
      linear-gradient(hsl(var(--hue) 100% 65% / .10) 1px, transparent 1px),
      linear-gradient(90deg, hsl(var(--hue) 100% 65% / .10) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000, transparent 85%);
    mask-image: radial-gradient(120% 90% at 50% 0%, #000, transparent 85%);
    animation: gridscroll 7s linear infinite;
  }
  .bg-scan {
    z-index: 9998; opacity: .35; mix-blend-mode: overlay;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.07) 0 1px, transparent 1px 3px);
    animation: scan 8s linear infinite;
  }

  @keyframes huecycle { to { --hue: 360; } }
  @keyframes blob { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(3%, 2%) scale(1.08); } }
  @keyframes gridscroll { to { background-position: 46px 46px; } }
  @keyframes scan { to { background-position: 0 220px; } }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes flicker {
    0%,17%,21%,24%,55%,59%,100% { opacity: 1; }
    19%,23%,57% { opacity: .45; }
  }
  @keyframes dangerPulse {
    0%,100% { background: rgba(255,45,107,.1); box-shadow: inset 0 0 30px rgba(255,45,107,.25); }
    50% { background: rgba(255,45,107,.38); box-shadow: inset 0 0 60px rgba(255,45,107,.6); }
  }
  @keyframes glowflash { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  @keyframes strobe { 0%,42% { opacity: 0; } 43%,100% { opacity: .8; } }
  @keyframes sweep { to { background-position: -260% 0; } }
  @keyframes sheetpulse {
    0%,100% { box-shadow: 0 0 30px var(--n1), 0 0 90px hsl(var(--hue) 100% 50% / .5), inset 0 0 70px hsl(var(--hue) 100% 50% / .12); }
    50% { box-shadow: 0 0 70px var(--n1), 0 0 180px var(--n2), 0 0 260px var(--n3), inset 0 0 130px hsl(var(--hue) 100% 50% / .3); }
  }
  @keyframes numpulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.8); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake { 0%,100% { transform: translate(0,0); } 20% { transform: translate(-3px,2px); } 40% { transform: translate(3px,-2px); } 60% { transform: translate(-2px,-3px); } 80% { transform: translate(2px,3px); } }
  @keyframes invertflash { 0%,90%,100% { opacity: 0; } 92%,96% { opacity: 1; } }
  @keyframes glitch {
    0%,100% { text-shadow: 0 0 10px var(--n1), 0 0 30px var(--n2), 0 0 80px var(--n3); transform: translate(0,0); }
    20% { text-shadow: -4px 0 #ff003c, 4px 0 #00e6ff, 0 0 50px var(--n2); transform: translate(1px,-1px); }
    40% { text-shadow: 4px 0 #ff003c, -4px 0 #00e6ff, 0 0 50px var(--n2); transform: translate(-1px,1px); }
    60% { text-shadow: -3px 0 #ff003c, 3px 0 #00e6ff, 0 0 70px var(--n3); transform: translate(1px,1px); }
    80% { text-shadow: 3px 0 #ff003c, -3px 0 #00e6ff, 0 0 70px var(--n3); transform: translate(-1px,-1px); }
  }

  /* 旋轉彩虹疊光 + 反相爆閃 */
  .bg-rgb {
    position: fixed; inset: -50%; pointer-events: none; z-index: 9994; mix-blend-mode: screen; opacity: .38;
    background: conic-gradient(from 0deg, #ff003c, #ffea00, #00ff66, #00e6ff, #6a00ff, #ff003c);
    animation: spin 2.4s linear infinite;
  }
  .bg-invert {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999; background: #fff;
    mix-blend-mode: difference; opacity: 0; animation: invertflash 1.4s steps(1, end) infinite;
  }

  /* 全螢幕頻閃 + 雷射掃光（光害本體） */
  .bg-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 9995; mix-blend-mode: screen;
    background: radial-gradient(circle at 50% 38%, hsl(var(--hue) 100% 62% / .7), transparent 62%);
    animation: strobe .2s steps(1, end) infinite;
  }
  .bg-laser {
    position: fixed; inset: 0; pointer-events: none; z-index: 9996; mix-blend-mode: screen;
    background: linear-gradient(115deg, transparent 42%, hsl(calc(var(--hue) + 60) 100% 72% / .6) 50%, transparent 58%);
    background-size: 260% 100%; animation: sweep 1.1s linear infinite;
  }

  .desk { padding: 30px 18px 80px; }
  .sheet {
    max-width: 1180px; margin: 0 auto;
    background: rgba(9, 6, 20, 0.72);
    border: 2px solid var(--n1);
    border-radius: 6px;
    animation: sheetpulse 1.1s ease-in-out infinite, shake .25s linear infinite;
  }

  /* ── 報頭 ── */
  .masthead { padding: 30px 40px 16px; text-align: center; border-bottom: 2px solid hsl(var(--hue) 100% 65% / .5); position: relative; }
  .kicker { font-family: var(--font-mono); font-size: 11px; letter-spacing: .42em; text-transform: uppercase; color: var(--n2); text-shadow: 0 0 10px var(--n2); padding-left: .42em; }
  .masthead h1 {
    font-family: var(--font-head); font-weight: 900; font-size: clamp(40px, 7.5vw, 88px);
    letter-spacing: .14em; margin: 6px 0 4px; padding-left: .14em; line-height: 1.02; color: #fff;
    text-shadow: 0 0 10px var(--n1), 0 0 30px var(--n1), 0 0 70px var(--n2), 0 0 110px var(--n3);
    animation: flicker 1.3s infinite, numpulse 1.1s ease-in-out infinite, glitch .35s steps(2, end) infinite;
  }
  .latin { font-family: var(--font-latin); font-weight: 500; color: var(--n3); font-size: clamp(13px, 1.6vw, 18px); letter-spacing: .26em; text-transform: uppercase; text-shadow: 0 0 12px var(--n3); }
  .dateline {
    display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 10px; border-top: 1px solid hsl(var(--hue) 100% 65% / .25);
    font-family: var(--font-mono); font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
  }
  .dateline .sep { color: var(--n2); text-shadow: 0 0 8px var(--n2); }
  .dateline #meta, .dateline #auto { color: var(--text); }

  /* ── 跑馬燈行情帶 ── */
  .tape { background: #07041a; overflow: hidden; border-top: 1px solid var(--n1); border-bottom: 1px solid var(--n1); box-shadow: 0 0 22px hsl(var(--hue) 100% 50% / .55); }
  .tape-track { display: inline-flex; white-space: nowrap; will-change: transform; animation: ticker 46s linear infinite; }
  .tape:hover .tape-track { animation-play-state: paused; }
  .tape-item { display: inline-flex; align-items: baseline; gap: 8px; padding: 10px 22px; font-family: var(--font-mono); font-size: 12.5px; letter-spacing: .06em; border-right: 1px solid hsl(var(--hue) 100% 65% / .2); }
  .tape-item .code { color: var(--text); text-shadow: 0 0 8px var(--n1); }
  .tape-item .nm { color: var(--muted); }
  .tape-item .mult { color: var(--n3); text-shadow: 0 0 8px var(--n3); }
  .tape-empty { padding: 10px 22px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  /* ── 數字 ── */
  .figures { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid hsl(var(--hue) 100% 65% / .3); }
  .figure { padding: 22px 22px 20px; border-right: 1px solid hsl(var(--hue) 100% 65% / .22); animation: rise .6s both; }
  .figures .figure:nth-child(1){ animation-delay: .04s } .figures .figure:nth-child(2){ animation-delay: .1s }
  .figures .figure:nth-child(3){ animation-delay: .16s } .figures .figure:nth-child(4){ animation-delay: .22s }
  .figure:last-child { border-right: none; }
  .figure .num { font-family: var(--font-latin); font-weight: 800; font-size: clamp(30px, 4.6vw, 52px); line-height: 1; color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 0 8px var(--n1), 0 0 24px var(--n1), 0 0 48px var(--n1); animation: numpulse 1s ease-in-out infinite; }
  .figure:nth-child(2) .num { text-shadow: 0 0 8px var(--n2), 0 0 24px var(--n2); }
  .figure:nth-child(3) .num { text-shadow: 0 0 8px var(--n3), 0 0 24px var(--n3); }
  .figure.accent .num { color: #fff; text-shadow: 0 0 10px var(--danger), 0 0 30px var(--danger); }
  .figure .cap { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 10px; }
  @media (max-width: 640px) { .figures { grid-template-columns: 1fr 1fr; } .figure:nth-child(2){ border-right: none; } }

  /* ── 區塊 ── */
  .section { padding: 24px 40px; border-bottom: 1px solid hsl(var(--hue) 100% 65% / .22); animation: rise .6s both; }
  .section-label { display: flex; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--n2); text-shadow: 0 0 10px var(--n2); margin-bottom: 20px; }
  .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--n2), transparent); box-shadow: 0 0 8px var(--n2); }
  .section-label .unit { color: var(--muted); letter-spacing: .1em; text-shadow: none; }
  .split { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 0 32px; }
  .split .vrule { background: hsl(var(--hue) 100% 65% / .4); box-shadow: 0 0 10px var(--n1); }
  @media (max-width: 760px) { .split { grid-template-columns: 1fr; } .split .vrule { display: none; } .split > div:first-child { margin-bottom: 26px; } .masthead, .section { padding-left: 24px; padding-right: 24px; } }

  /* 100% 占比條 + 排行 */
  .sharebar { display: flex; height: 18px; border: 1px solid hsl(var(--hue) 100% 70% / .6); box-shadow: 0 0 16px hsl(var(--hue) 100% 50% / .5); margin-bottom: 18px; overflow: hidden; transform-origin: left; animation: grow .8s cubic-bezier(.2,.8,.2,1) both; border-radius: 3px; }
  .sharebar span { height: 100%; cursor: pointer; transition: filter .15s; }
  .sharebar span:hover { filter: brightness(1.3) saturate(1.2); }
  .rank-row { display: grid; grid-template-columns: 12px 1fr auto auto; gap: 12px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid hsl(var(--hue) 100% 65% / .15); cursor: pointer; transition: opacity .15s; }
  .rank-row:last-child { border-bottom: none; }
  .rank-row.dim { opacity: .3; }
  .rank-row .swatch { width: 12px; height: 12px; align-self: center; box-shadow: 0 0 10px currentColor; }
  .rank-row .rname { font-family: var(--font-serif); font-weight: 500; font-size: 15px; }
  .rank-row:hover .rname { color: var(--n2); text-shadow: 0 0 10px var(--n2); }
  .rank-row .rcnt { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
  .rank-row .rpct { font-family: var(--font-latin); font-weight: 700; font-size: 16px; color: var(--text); font-variant-numeric: tabular-nums; text-shadow: 0 0 10px var(--n2); }

  /* 個股長條 */
  .bar-row { display: grid; grid-template-columns: 118px 1fr 30px; gap: 12px; align-items: center; padding: 5px 0; cursor: pointer; }
  .bar-row .name { font-family: var(--font-mono); font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-row .bar-name { font-family: var(--font-serif); color: var(--muted); }
  .bar-row:hover .name { color: var(--n2); text-shadow: 0 0 10px var(--n2); }
  .bar-track { height: 12px; background: rgba(255,255,255,.05); border: 1px solid hsl(var(--hue) 100% 70% / .3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--n1), var(--n2)); box-shadow: 0 0 12px var(--glow); transform-origin: left; animation: grow .8s cubic-bezier(.2,.8,.2,1) both; }
  .bar-row:hover .bar-fill { filter: brightness(1.25); }
  .bar-row .cnt { font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-align: right; }

  /* 趨勢柱 */
  .trend { display: flex; align-items: flex-end; gap: 5px; height: 158px; border-bottom: 1px solid hsl(var(--hue) 100% 70% / .5); box-shadow: 0 1px 12px hsl(var(--hue) 100% 50% / .35); }
  .trend-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; min-width: 0; }
  .trend-stack { display: flex; flex-direction: column-reverse; transform-origin: bottom; animation: growUp .7s cubic-bezier(.2,.8,.2,1) both; filter: drop-shadow(0 0 6px hsl(var(--hue) 100% 50% / .4)); }
  .trend-col:hover .trend-stack { filter: brightness(1.25) saturate(1.2); }
  .trend-seg { width: 100%; }
  .trend-x { display: flex; gap: 5px; margin-top: 7px; }
  .trend-x span { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── 控制列 ── */
  .controls { display: flex; gap: 26px; flex-wrap: wrap; align-items: flex-end; padding: 22px 40px; border-bottom: 1px solid hsl(var(--hue) 100% 65% / .22); }
  @media (max-width: 760px) { .controls { padding: 22px 24px; } }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field.search { flex: 1; min-width: 200px; }
  .field label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--n2); text-shadow: 0 0 8px var(--n2); }
  .field input, .field select {
    border: none; border-bottom: 1.5px solid hsl(var(--hue) 100% 70% / .5); background: transparent;
    font-family: var(--font-serif); font-size: 15px; color: var(--text); padding: 6px 2px;
  }
  .field select { cursor: pointer; }
  .field select option { background: #0a0720; color: var(--text); }
  .field input:focus, .field select:focus { outline: none; border-color: var(--n2); box-shadow: 0 6px 16px -10px var(--n2); }
  .field input::placeholder { color: var(--muted); opacity: .7; }
  button.refresh {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    border: 1.5px solid var(--n1); background: transparent; color: var(--text);
    text-shadow: 0 0 8px var(--n1); box-shadow: 0 0 14px hsl(var(--hue) 100% 50% / .4), inset 0 0 14px hsl(var(--hue) 100% 50% / .15);
    padding: 9px 18px; cursor: pointer; transition: .18s; margin-left: auto; border-radius: 4px;
  }
  button.refresh:hover { background: var(--n1); color: #05030c; text-shadow: none; box-shadow: 0 0 26px var(--n1); }

  /* 自選股 / 重點整理 切換鈕 */
  button.tbtn {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    border: 1.5px solid hsl(var(--hue) 100% 72% / .5); background: transparent; color: var(--text);
    padding: 9px 14px; cursor: pointer; transition: .16s; border-radius: 4px;
  }
  button.tbtn:hover { border-color: var(--n1); box-shadow: 0 0 14px hsl(var(--hue) 100% 50% / .35); }
  button.tbtn.on {
    background: hsl(var(--hue) 100% 60% / .16); border-color: var(--n1);
    color: var(--n1); text-shadow: 0 0 8px var(--n1); box-shadow: 0 0 16px hsl(var(--hue) 100% 50% / .4), inset 0 0 12px hsl(var(--hue) 100% 50% / .18);
  }

  /* 個股標籤旁的自選星號 */
  .star {
    cursor: pointer; user-select: none; font-size: 13px; line-height: 1;
    color: hsl(var(--hue) 100% 72% / .5); transition: .15s; padding: 0 2px;
  }
  .star:hover { color: var(--n1); transform: scale(1.25); }
  .star.on { color: #f6d365; text-shadow: 0 0 10px rgba(246,211,101,.8); }

  /* 自選股管理面板 */
  .wl-panel { border: 1px solid hsl(var(--hue) 100% 72% / .28); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; background: hsl(var(--hue) 60% 10% / .35); animation: rise .4s both; }
  .wl-panel[hidden] { display: none; }
  .wl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .wl-row input {
    flex: 1 1 220px; min-width: 180px; font-family: var(--font-mono); font-size: 13px;
    background: rgba(0,0,0,.35); border: 1px solid hsl(var(--hue) 100% 72% / .35); color: var(--text);
    padding: 9px 12px; border-radius: 5px;
  }
  .wl-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .wl-chips:empty::after { content: "尚未加入任何自選股。輸入股號或名稱後按 Enter，或點新聞個股旁的 ☆。"; color: var(--muted); font-size: 12px; }
  .wl-chip {
    display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 12.5px;
    border: 1px solid hsl(var(--hue) 100% 72% / .4); border-radius: 4px; padding: 4px 10px; background: hsl(var(--hue) 100% 60% / .1);
  }
  .wl-chip .x { cursor: pointer; color: var(--muted); transition: .15s; }
  .wl-chip .x:hover { color: #ff5a7a; }
  .wl-chip .nm { color: var(--muted); }
  .wl-actions { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .wl-mini { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; background: transparent; border: 1px solid hsl(var(--hue) 100% 72% / .3); color: var(--muted); padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: .15s; }
  .wl-mini:hover { color: var(--text); border-color: var(--n1); }

  /* 重點整理面板 */
  .dg-panel { border: 1px solid hsl(var(--hue) 100% 72% / .28); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; background: hsl(var(--hue) 60% 10% / .3); animation: rise .4s both; }
  .dg-panel[hidden] { display: none; }
  .dg-note { font-size: 11.5px; color: var(--muted); letter-spacing: .04em; margin-bottom: 12px; }
  .dg-ai { border: 1px solid rgba(246,211,101,.4); background: rgba(246,211,101,.07); border-radius: 8px; padding: 14px 16px; margin-bottom: 18px; }
  .dg-ai .dg-ai-tag { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: #f6d365; margin-bottom: 8px; }
  .dg-ai p { font-size: 13.5px; line-height: 1.7; margin: 0; white-space: pre-wrap; }
  .dg-overview { display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 18px; }
  .dg-ov { font-family: var(--font-mono); }
  .dg-ov b { display: block; font-size: 22px; color: var(--n1); text-shadow: 0 0 10px hsl(var(--hue) 100% 50% / .5); }
  .dg-ov span { font-size: 11px; color: var(--muted); letter-spacing: .06em; }
  .dg-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 16px 0 10px; }
  .dg-kw { display: flex; gap: 8px; flex-wrap: wrap; }
  .dg-kw span { font-family: var(--font-mono); font-size: 12px; border: 1px solid hsl(var(--hue) 100% 72% / .3); border-radius: 3px; padding: 3px 9px; }
  .dg-kw b { color: var(--n1); }
  .dg-scroll { overflow-x: auto; }
  table.dg-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.dg-table th, table.dg-table td { text-align: left; padding: 7px 9px; border-bottom: 1px solid hsl(var(--hue) 100% 72% / .14); vertical-align: top; }
  table.dg-table th { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  table.dg-table .code { font-family: var(--font-mono); color: var(--n1); }
  table.dg-table .code-name { color: var(--muted); margin-left: 6px; }
  table.dg-table a { color: var(--text); text-decoration: none; }
  table.dg-table a:hover { color: var(--n1); text-decoration: underline; }
  table.dg-table .dg-warn { color: #ff7a92; }
  table.dg-table .num { text-align: right; font-family: var(--font-mono); }

  /* 重點整理:分組切換(總覽/依個股/依事件) */
  .dg-seg { display: inline-flex; gap: 0; border: 1px solid hsl(var(--hue) 100% 72% / .3); border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
  .dg-seg button {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; background: transparent;
    border: none; border-right: 1px solid hsl(var(--hue) 100% 72% / .2); color: var(--muted);
    padding: 7px 16px; cursor: pointer; transition: .15s;
  }
  .dg-seg button:last-child { border-right: none; }
  .dg-seg button:hover { color: var(--text); }
  .dg-seg button.on { background: hsl(var(--hue) 100% 60% / .18); color: var(--n1); text-shadow: 0 0 8px var(--n1); }

  /* 分組卡片(個股 / 事件) */
  .dg-group { border: 1px solid hsl(var(--hue) 100% 72% / .22); border-radius: 10px; margin-bottom: 14px; overflow: hidden; animation: rise .4s both; }
  .dg-group-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; padding: 11px 15px; background: hsl(var(--hue) 60% 12% / .5); border-bottom: 1px solid hsl(var(--hue) 100% 72% / .16); }
  .dg-group-head .g-code { font-family: var(--font-mono); font-size: 15px; color: var(--n1); text-shadow: 0 0 8px var(--n1); }
  .dg-group-head .g-name { color: var(--text); }
  .dg-group-head .g-title { font-size: 15px; color: var(--text); font-weight: 600; }
  .dg-group-head .g-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  .dg-group-head .g-warn { color: #ff7a92; font-size: 11px; }
  .dg-ai-points { padding: 12px 15px; font-size: 13px; line-height: 1.7; border-bottom: 1px dashed hsl(var(--hue) 100% 72% / .18); background: rgba(246,211,101,.06); }
  .dg-ai-points .tag-ai { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .12em; color: #f6d365; margin-right: 8px; text-transform: uppercase; }
  .dg-ai-points .tag-kp { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .12em; color: var(--n2); margin-right: 8px; text-transform: uppercase; }
  .dg-hlist { list-style: none; margin: 0; padding: 8px 15px 12px; }
  .dg-hlist li { padding: 5px 0; border-bottom: 1px solid hsl(var(--hue) 100% 72% / .1); font-size: 12.5px; line-height: 1.5; }
  .dg-hlist li:last-child { border-bottom: none; }
  .dg-hlist a { color: var(--text); text-decoration: none; }
  .dg-hlist a:hover { color: var(--n1); text-decoration: underline; }
  .dg-hlist .h-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); margin-right: 8px; }
  .dg-hlist .h-warn { color: #ff7a92; margin-left: 6px; }
  .dg-hlist .h-dup { color: var(--n2); font-family: var(--font-mono); font-size: 10.5px; margin-left: 8px; opacity: .85; }
  /* 依個股卡片內的每日分段 */
  .dg-day { padding: 10px 15px 6px; border-top: 1px dashed hsl(var(--hue) 100% 72% / .16); }
  .dg-day:first-of-type { border-top: none; padding-top: 12px; }
  .dg-day-head { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: .06em; color: var(--n1); text-shadow: 0 0 6px hsl(var(--hue) 100% 50% / .3); margin-bottom: 7px; }
  .dg-day-head .dg-day-cnt { color: var(--muted); margin-left: 8px; text-shadow: none; }
  .dg-day .dg-ai-points { margin-bottom: 8px; }
  .dg-day .dg-hlist { padding: 0; }
  .dg-ev-stocks { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 15px 12px; }
  .dg-ev-stocks .evs { font-family: var(--font-mono); font-size: 11.5px; border: 1px solid hsl(var(--hue) 100% 72% / .3); border-radius: 3px; padding: 2px 8px; cursor: pointer; transition: .15s; }
  .dg-ev-stocks .evs:hover { border-color: var(--n1); color: var(--n1); }

  /* 網路搜尋 (HSG) 面板 */
  .net-panel { border: 1px solid hsl(var(--hue) 100% 72% / .28); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; background: hsl(var(--hue) 60% 10% / .3); animation: rise .4s both; }
  .net-panel[hidden] { display: none; }
  .net-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .net-row input {
    flex: 1 1 260px; min-width: 200px; font-family: var(--font-mono); font-size: 13px;
    background: rgba(0,0,0,.35); border: 1px solid hsl(var(--hue) 100% 72% / .35); color: var(--text);
    padding: 9px 12px; border-radius: 5px;
  }
  .net-note { font-size: 11.5px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .net-note code { font-family: var(--font-mono); color: var(--n1); background: rgba(0,0,0,.35); padding: 1px 6px; border-radius: 3px; }
  .net-results { margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
  .net-item { border: 1px solid hsl(var(--hue) 100% 72% / .18); border-radius: 8px; padding: 11px 14px; animation: rise .35s both; }
  .net-item .n-title { font-size: 14px; }
  .net-item .n-title a { color: var(--text); text-decoration: none; }
  .net-item .n-title a:hover { color: var(--n1); text-decoration: underline; }
  .net-item .n-url { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); word-break: break-all; margin: 3px 0 6px; }
  .net-item .n-snip { font-size: 12.5px; line-height: 1.6; color: var(--text); }
  .net-item .n-crawl { margin-top: 9px; }
  .net-item .n-crawl button { font-family: var(--font-mono); font-size: 11px; background: transparent; border: 1px solid hsl(var(--hue) 100% 72% / .35); color: var(--muted); padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: .15s; }
  .net-item .n-crawl button:hover { color: var(--n1); border-color: var(--n1); }
  .net-item .n-body { margin-top: 10px; padding: 10px 12px; border-top: 1px dashed hsl(var(--hue) 100% 72% / .2); font-size: 12.5px; line-height: 1.75; white-space: pre-wrap; max-height: 340px; overflow-y: auto; color: var(--text); }
  .net-item .n-body.err { color: #ff7a92; }

  /* 圖表分析摺疊區(預設關閉,移到最下面,減少一開場的資訊量) */
  .analytics { margin-top: 6px; }
  .analytics-toggle {
    width: 100%; text-align: left; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em;
    background: hsl(var(--hue) 60% 10% / .3); border: 1px solid hsl(var(--hue) 100% 72% / .22);
    color: var(--text); padding: 13px 16px; border-radius: 8px; cursor: pointer; transition: .15s;
  }
  .analytics-toggle:hover { border-color: var(--n1); color: var(--n1); }
  .analytics-toggle .caret { display: inline-block; transition: transform .2s; color: var(--n1); }
  .analytics-toggle.open .caret { transform: rotate(90deg); }
  .analytics-toggle .at-sub { color: var(--muted); font-size: 11px; letter-spacing: .04em; }
  .analytics-body { margin-top: 4px; }
  .analytics-body[hidden] { display: none; }

  .active-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .active-filters:empty { display: none; }
  .chip {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .04em;
    border: 1px solid var(--n2); color: var(--n2); text-shadow: 0 0 8px var(--n2); box-shadow: 0 0 12px hsl(var(--hue) 100% 50% / .35);
    padding: 4px 12px; cursor: pointer; transition: .15s; border-radius: 3px;
  }
  .chip:hover { background: var(--n2); color: #05030c; text-shadow: none; }

  /* ── 新聞 ── */
  #list { animation: rise .6s both; }
  .article {
    display: grid; grid-template-columns: 128px 1fr; gap: 24px;
    padding: 18px 20px; margin-bottom: 14px; border-radius: 5px;
    background: rgba(13, 8, 28, 0.55);
    border: 1px solid hsl(var(--hue) 100% 72% / .2); border-left: 3px solid var(--n1);
    box-shadow: 0 0 16px hsl(var(--hue) 100% 50% / .12);
    transition: transform .2s, box-shadow .25s, border-color .25s; animation: rise .45s both;
  }
  .article:hover { transform: translateX(5px); border-color: var(--n2); box-shadow: -8px 0 30px hsl(var(--hue) 100% 55% / .5), 0 0 26px hsl(var(--hue) 100% 50% / .35); }
  .article .meta-col { display: flex; flex-direction: column; gap: 6px; padding-top: 3px; }
  .a-source { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--n1); text-shadow: 0 0 10px var(--n1); }
  .a-time { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .a-rel { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); opacity: .8; }
  .a-title {
    font-family: var(--font-head); font-weight: 700; font-size: 20px; line-height: 1.36;
    color: var(--text); display: inline; background-image: linear-gradient(var(--n2), var(--n2));
    background-size: 0% 2px; background-position: 0 100%; background-repeat: no-repeat; transition: background-size .3s, color .2s, text-shadow .2s;
  }
  .article a.a-title-link { text-decoration: none; }
  .article:hover .a-title { color: #fff; text-shadow: 0 0 12px var(--n2); background-size: 100% 2px; }
  .a-summary { font-family: var(--font-serif); font-size: 16.5px; line-height: 1.65; color: var(--muted); margin: 8px 0 0; max-width: 68ch; }
  .a-stocks { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 11px; }
  .tag {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .03em; color: var(--text);
    border: 1px solid hsl(var(--hue) 100% 70% / .4); padding: 2px 9px; cursor: pointer; transition: .15s; border-radius: 3px;
  }
  .tag::before { content: "▸ "; color: var(--n1); }
  .tag:hover { border-color: var(--n2); color: #fff; box-shadow: 0 0 14px hsl(var(--hue) 100% 50% / .5); text-shadow: 0 0 8px var(--n2); }
  @media (max-width: 640px) { .article { grid-template-columns: 1fr; gap: 8px; } .article .meta-col { flex-direction: row; gap: 12px; align-items: baseline; flex-wrap: wrap; } }

  /* 風險警示個股表格 */
  .risk-scroll { overflow-x: auto; }
  .risk-table { width: 100%; border-collapse: collapse; }
  .risk-table th { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--n2); text-shadow: 0 0 8px var(--n2); text-align: left; padding: 9px 12px; border-bottom: 1.5px solid hsl(var(--hue) 100% 70% / .5); white-space: nowrap; }
  .risk-table th.num, .risk-table td.num { text-align: right; }
  .risk-table td { padding: 11px 12px; border-bottom: 1px solid hsl(var(--hue) 100% 65% / .14); vertical-align: baseline; }
  .risk-table tbody tr { cursor: pointer; transition: background .15s; animation: rise .45s both; }
  .risk-table tbody tr:hover { background: hsl(var(--hue) 100% 60% / .1); }
  .risk-table .idx { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .risk-table .code { font-family: var(--font-latin); font-weight: 700; font-size: 20px; color: var(--text); font-variant-numeric: tabular-nums; text-shadow: 0 0 10px var(--n1); }
  .risk-table .code-name { font-family: var(--font-serif); font-size: 13px; color: var(--muted); margin-left: 8px; }
  .risk-table tr.alert { animation: dangerPulse .7s steps(2, end) infinite; }
  .risk-table tr.alert .code { color: #fff; text-shadow: 0 0 10px var(--danger), 0 0 24px var(--danger); }
  .risk-table .cnt { font-family: var(--font-mono); font-size: 14px; color: var(--text); font-variant-numeric: tabular-nums; }
  .risk-table .badge { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .06em; color: #fff; background: var(--danger); box-shadow: 0 0 12px var(--danger); padding: 1px 7px; white-space: nowrap; border-radius: 2px; }
  .risk-table .badge.watch { background: transparent; color: var(--muted); border: 1px solid hsl(var(--hue) 100% 70% / .35); box-shadow: none; font-weight: 400; }
  .risk-table .kw { font-family: var(--font-mono); font-size: 11px; color: var(--n3); }
  .risk-empty { font-family: var(--font-serif); color: var(--muted); padding: 6px 0 2px; }

  .a-warn { display: inline-block; width: fit-content; font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: .06em; color: #fff; background: var(--danger); box-shadow: 0 0 12px var(--danger); padding: 1px 7px; border-radius: 2px; }

  /* 個股彙整 */
  .stock-group { border: 1px solid hsl(var(--hue) 100% 72% / .22); border-radius: 10px; margin-bottom: 18px; overflow: hidden; animation: rise .45s both; }
  .sg-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; padding: 12px 16px; background: hsl(var(--hue) 100% 60% / .08); border-bottom: 1px solid hsl(var(--hue) 100% 72% / .2); cursor: pointer; transition: background .15s; }
  .sg-head:hover { background: hsl(var(--hue) 100% 60% / .15); }
  .sg-code { font-family: var(--font-latin); font-weight: 700; font-size: 22px; color: var(--text); font-variant-numeric: tabular-nums; text-shadow: 0 0 10px var(--n1); }
  .sg-name { font-family: var(--font-serif); font-size: 15px; color: var(--muted); }
  .sg-count { font-family: var(--font-mono); font-size: 12px; color: var(--n2); }
  .sg-srcs { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .sg-srcs span { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); border: 1px solid hsl(var(--hue) 100% 70% / .3); padding: 1px 7px; border-radius: 3px; }
  .sg-items { padding: 4px 16px; }
  .sg-items .article { background: transparent; border: none; border-bottom: 1px solid hsl(var(--hue) 100% 65% / .12); border-radius: 0; margin: 0; padding: 14px 0; box-shadow: none; animation: none; }
  .sg-items .article:last-child { border-bottom: none; }
  .sg-items .article:hover { transform: none; box-shadow: none; border-color: hsl(var(--hue) 100% 65% / .12); }

  /* 分頁 */
  .pager { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 24px; }
  .pager:empty { display: none; }
  .pager button {
    font-family: var(--font-mono); font-size: 12px; color: var(--text); background: transparent;
    border: 1px solid hsl(var(--hue) 100% 70% / .4); padding: 7px 12px; cursor: pointer; border-radius: 4px; transition: .15s;
  }
  .pager button:hover:not(:disabled) { border-color: var(--n2); color: #fff; box-shadow: 0 0 14px hsl(var(--hue) 100% 50% / .5); text-shadow: 0 0 8px var(--n2); }
  .pager button.on { background: var(--n2); color: #05030c; border-color: var(--n2); box-shadow: 0 0 18px var(--n2); }
  .pager button:disabled { opacity: .3; cursor: default; }
  .pg-gap { color: var(--muted); padding: 0 2px; }
  .pg-summary { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: auto; }

  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-family: var(--font-serif); }
  mark { background: hsl(var(--hue) 100% 60% / .35); color: #fff; text-shadow: 0 0 8px var(--n2); border-radius: 2px; }
  a { color: var(--n2); }

  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: hsl(var(--hue) 100% 60% / .5); border: 2px solid transparent; background-clip: padding-box; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: hsl(var(--hue) 100% 65% / .8); background-clip: padding-box; }

  /* ── 風格切換鈕 ── */
  .fab { position: fixed; top: 16px; right: 16px; z-index: 10000; display: flex; gap: 10px; }
  .theme-toggle {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .08em; color: #fff;
    background: rgba(10, 12, 22, .7); border: 1px solid rgba(255,255,255,.4);
    padding: 9px 15px; border-radius: 999px; cursor: pointer;
    backdrop-filter: blur(8px); box-shadow: 0 4px 18px rgba(0,0,0,.55); transition: transform .15s, box-shadow .2s;
  }
  .theme-toggle:hover { transform: translateY(-1px); box-shadow: 0 7px 24px rgba(0,0,0,.65); }
  .theme-toggle:active { transform: scale(.96); }

  /* 特效層預設關閉，只有霓虹模式開啟 */
  .bg-rgb, .bg-glow, .bg-grid, .bg-laser, .bg-flash, .bg-invert, .bg-scan, .bg-sparkle { display: none; }
  body.fx-neon .bg-rgb, body.fx-neon .bg-glow, body.fx-neon .bg-grid,
  body.fx-neon .bg-laser, body.fx-neon .bg-flash, body.fx-neon .bg-invert, body.fx-neon .bg-scan { display: block; }

  /* 金光流動 / 閃爍 keyframes */
  @keyframes goldshine { to { background-position: 200% center; } }
  @keyframes twinkle { 0%,100% { opacity: .22; } 50% { opacity: 1; } }
  @keyframes twinkle2 { 0%,100% { opacity: .9; } 50% { opacity: .25; } }

  /* 黃金閃爍粒子層（只在鎏金模式顯示） */
  body.fx-gold .bg-sparkle { display: block; }
  .bg-sparkle {
    position: fixed; inset: 0; pointer-events: none; z-index: 9990; mix-blend-mode: screen;
  }
  .bg-sparkle::before, .bg-sparkle::after {
    content: ""; position: absolute; inset: 0;
    background-repeat: no-repeat;
  }
  .bg-sparkle::before {
    background-image:
      radial-gradient(2px 2px at 18% 26%, #fff3c4, transparent 60%),
      radial-gradient(1.6px 1.6px at 71% 18%, #f6d365, transparent 60%),
      radial-gradient(2px 2px at 41% 67%, #fffbe6, transparent 60%),
      radial-gradient(1.6px 1.6px at 86% 58%, #f6d365, transparent 60%),
      radial-gradient(2px 2px at 56% 41%, #fff3c4, transparent 60%),
      radial-gradient(1.6px 1.6px at 9% 78%, #f6d365, transparent 60%);
    animation: twinkle 2.6s ease-in-out infinite;
  }
  .bg-sparkle::after {
    background-image:
      radial-gradient(2px 2px at 92% 86%, #fffbe6, transparent 60%),
      radial-gradient(1.6px 1.6px at 33% 9%, #f6d365, transparent 60%),
      radial-gradient(2px 2px at 64% 82%, #fff3c4, transparent 60%),
      radial-gradient(1.6px 1.6px at 27% 52%, #f6d365, transparent 60%),
      radial-gradient(2px 2px at 78% 38%, #fffbe6, transparent 60%),
      radial-gradient(1.6px 1.6px at 48% 92%, #f6d365, transparent 60%);
    animation: twinkle2 3.1s ease-in-out infinite;
  }

  /* ═══════════ 鎏金奢華（黃金 · 閃閃發光）═══════════ */
  body.fx-gold {
    --hue: 45;
    --n1: #f6d365; --n2: #c9971f; --n3: #fff3c4;
    --text: #f3ead2; --muted: #b6a577;
    background:
      radial-gradient(72% 62% at 50% -12%, #2c2413 0%, transparent 60%),
      radial-gradient(62% 72% at 100% 102%, #241b0b 0%, transparent 55%),
      #0b0905;
    background-attachment: fixed;
  }
  body.fx-gold .sheet {
    background: linear-gradient(180deg, rgba(30,24,13,.92), rgba(15,11,6,.95));
    border: 1px solid rgba(246,211,101,.5);
    box-shadow: 0 34px 90px -34px rgba(0,0,0,.88), 0 0 46px rgba(201,151,31,.22), inset 0 1px 0 rgba(255,243,196,.16);
    animation: none;
  }
  body.fx-gold .masthead { border-bottom: 1px solid rgba(246,211,101,.4); }
  body.fx-gold .masthead h1 {
    animation: goldshine 3.2s linear infinite;
    background: linear-gradient(100deg, #8a6a14 0%, #f6d365 28%, #fffbe6 50%, #f6d365 72%, #8a6a14 100%);
    background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: none; filter: drop-shadow(0 3px 12px rgba(201,151,31,.5));
  }
  body.fx-gold .kicker, body.fx-gold .latin { text-shadow: none; color: var(--n2); }

<script>
const TZ = "Asia/Taipei";
let ALL = [];
const state = { q: "", source: "", stock: "", range: 0, sort: "new", riskOnly: false, watchOnly: false, digest: false, digestGroup: "overview", net: false, analytics: false, page: 1, market: "tw", lang: "zh", view: "list" };
const PAGE_SIZE = 20; // 每頁新聞數
let lastFilterKey = "";

// ── 自選股清單 ──────────────────────────────────────────────
// 生效清單 = localStorage 有就用它（使用者曾編輯過），否則用 data/watchlist.json 種子。
const WATCH_KEY = "dashWatch";
let WATCH = new Set();       // 目前生效的股號集合
let WATCH_SEED = [];         // watchlist.json 種子
let AI_SUMMARY = null;       // data/summary.json（B 階段 AI 重點，可能為 null）
function loadWatch() {
  let stored = null;
  try { const raw = localStorage.getItem(WATCH_KEY); if (raw) stored = JSON.parse(raw); } catch (e) {}
  const list = Array.isArray(stored) ? stored : WATCH_SEED;
  WATCH = new Set(list.map(c => String(c).trim().toUpperCase()).filter(Boolean));
}
function saveWatch() {
  try { localStorage.setItem(WATCH_KEY, JSON.stringify([...WATCH])); } catch (e) {}
}
function normCode(x) { return String(x || "").trim().toUpperCase(); }
function inWatch(code) { return WATCH.has(normCode(code)); }
// 把使用者輸入（股號或名稱）解析成股號；名稱用 STOCK_MAP 反查
function resolveToCode(input) {
  const s = String(input || "").trim();
  if (!s) return null;
  const up = s.toUpperCase();
  // 直接是股號（已在對照表，或就是純代號樣式）
  if (STOCK_MAP[s] || STOCK_MAP[up]) return up;
  if (/^[0-9A-Z.\-]{1,8}$/.test(up)) return up;
  // 當作名稱反查（STOCK_MAP: code -> name；STOCK_NAMES: code -> name）
  for (const [code, name] of Object.entries(STOCK_MAP)) if (name === s) return normCode(code);
  for (const [code, name] of Object.entries(STOCK_NAMES)) if (name === s) return normCode(code);
  return up; // 退而求其次，照原樣當股號存
}
function watchAdd(input) { const c = resolveToCode(input); if (!c) return false; WATCH.add(c); saveWatch(); return true; }
function watchRemove(code) { WATCH.delete(normCode(code)); saveWatch(); }
function watchResetSeed() { WATCH = new Set(WATCH_SEED.map(normCode).filter(Boolean)); try { localStorage.removeItem(WATCH_KEY); } catch (e) {} }
function watchClear() { WATCH = new Set(); saveWatch(); }

// 風險／利空字詞（台股中文）
const RISK_TW = [
  "跌停", "暴跌", "重挫", "崩跌", "崩盤", "跳水", "大跌", "急殺", "殺盤", "賣壓",
  "利空", "違約交割", "違約", "違規", "下市", "全額交割", "處置", "注意股", "警示", "示警",
  "減資", "虧損", "轉虧", "衰退", "踩雷", "地雷", "爆雷", "掏空", "淘空", "假帳",
  "訴訟", "起訴", "遭罰", "裁罰", "罰鍰", "違法", "停牌", "下修", "降評", "跌破",
  "摜破", "失守", "認賠", "套牢", "重整", "倒閉", "破產", "重貶", "財務危機", "跌幅"
];
// 風險／利空字詞（美股英文，不分大小寫）
const RISK_US = [
  "plunge", "plummet", "crash", "tumble", "slump", "sink", "selloff", "sell-off",
  "downgrade", "bankruptcy", "bankrupt", "default", "lawsuit", "sued", "fraud",
  "probe", "investigation", "delist", "warning", "warns", "miss", "slashed",
  "layoff", "recall", "loss", "losses", "bearish", "slide", "collapse",
  "plummets", "plunges", "tumbles", "slumps", "sinks", "drops", "falls"
];
// 個股至少要有這麼多則風險新聞才列入「風險警示個股」
const RISK_MIN = 2;
function riskHits(text) {
  const us = state.market === "us";
  const words = us ? RISK_US : RISK_TW;
  const t = us ? String(text || "").toLowerCase() : String(text || "");
  return words.filter(k => t.includes(k));
}
function newsRisk(n) { return riskHits((n.title || "") + " " + (n.summary || "")); }

// 依目前語言取標題／摘要（沒翻到就退回原文）
function dispTitle(n) { return n["title_" + state.lang] || n.title || ""; }
function dispSummary(n) { return n["summary_" + state.lang] || n.summary || ""; }

function stockCode(s) { const p = String(s).split(":"); return p.length >= 2 ? p[1] : s; }
function parseTime(iso) { if (!iso) return null; const t = new Date(iso); return isNaN(t) ? null : t; }
function fmtTime(iso) {
  const t = parseTime(iso); if (!t) return "—";
  return t.toLocaleString("zh-Hant", { timeZone: TZ, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false });
}
function relTime(iso) {
  const t = parseTime(iso); if (!t) return "";
  const d = (Date.now() - t.getTime()) / 60000;
  if (d < 1) return "剛剛"; if (d < 60) return Math.floor(d) + " 分前";
  if (d < 1440) return Math.floor(d / 60) + " 小時前"; return Math.floor(d / 1440) + " 天前";
}
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function highlight(text, q) {
  const t = esc(text); if (!q) return t;
  try { const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi"); return t.replace(re, "<mark>$1</mark>"); }
  catch { return t; }
}
function countUp(el, to, dur = 850) {
  if (!isFinite(to)) { el.textContent = to; return; }
  const start = performance.now();
  (function tick(now) {
    const p = Math.min(1, (now - start) / dur);
    el.textContent = Math.round(to * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(tick);
  })(start);
}

// 報紙印刷的低彩度墨色，依來源名稱固定配色
const PALETTE = ["#b42a18", "#2f6b66", "#a9791f", "#3a4a6b", "#79415e", "#4f6b34", "#9c5a2a", "#555067"];
let SOURCE_COLORS = {};
function buildSourceColors() {
  const sources = [...new Set(ALL.map(n => n.source).filter(Boolean))].sort();
  SOURCE_COLORS = {};
  sources.forEach((s, i) => SOURCE_COLORS[s] = PALETTE[i % PALETTE.length]);
}
function sourceColor(s) { return SOURCE_COLORS[s] || "#7a7164"; }

// 全市場代號→名稱對照表（爬蟲從證交所/櫃買抓的 data/stocks.json，權威來源）
let STOCK_MAP = {};
// 從新聞文字解析「名稱(股號)」→ 補充對照（stocks.json 沒抓到時的後備）
let STOCK_NAMES = {};
function buildStockNames() {
  STOCK_NAMES = {};
  ALL.forEach(n => {
    const text = (n.title || "") + " " + (n.summary || "");
    (n.stocks || []).forEach(s => {
      const code = stockCode(s);
      if (STOCK_NAMES[code]) return;
      const ec = code.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const re = new RegExp("([\\u4e00-\\u9fa5A-Za-z0-9\\*\\-．]{1,14})[（(]\\s*" + ec + "(?:\\s*[-‑]\\s*TW)?\\s*[）)]");
      const m = text.match(re);
      if (m) STOCK_NAMES[code] = m[1].trim();
    });
  });
}
function stockName(code) { return STOCK_MAP[code] || STOCK_NAMES[code] || ""; }

async function load() {
  const meta = document.getElementById("meta");
  document.getElementById("today").textContent =
    new Date().toLocaleDateString("zh-Hant", { timeZone: TZ, year: "numeric", month: "long", day: "numeric", weekday: "long" });
  meta.textContent = "載入中…";
  const newsFile = state.market === "us" ? "data/news_us.json" : "data/news.json";
  try {
    const res = await fetch(newsFile + "?_=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    ALL = await res.json();
  } catch (e) {
    meta.textContent = "讀取失敗：" + e.message;
    document.getElementById("list").innerHTML =
      `<div class="empty">無法載入 ${newsFile}。<br>請在專案根目錄執行 <code>python -m http.server 8000</code>，再開啟 <a href="http://localhost:8000">http://localhost:8000</a>。</div>`;
    return;
  }
  // 台股才載入全市場股號→名稱對照表；美股無此表
  STOCK_MAP = {};
  if (state.market === "tw") {
    try {
      const sr = await fetch("data/stocks.json?_=" + Date.now());
      if (sr.ok) STOCK_MAP = await sr.json();
    } catch (e) { /* 忽略：退回內文解析 */ }
  }

  // 自選股種子（data/watchlist.json，可有可無）
  try {
    const wr = await fetch("data/watchlist.json?_=" + Date.now());
    if (wr.ok) { const seed = await wr.json(); WATCH_SEED = Array.isArray(seed) ? seed : []; }
  } catch (e) { WATCH_SEED = []; }
  loadWatch();

  // AI 重點（data/summary.json，B 階段產物；沒有就維持 null，看板自動退回規則式）
  AI_SUMMARY = null;
  try {
    const ar = await fetch("data/summary.json?_=" + Date.now());
    if (ar.ok) AI_SUMMARY = await ar.json();
  } catch (e) { /* 沒有就算了 */ }

  const sel = document.getElementById("sourceSel");
  const sources = [...new Set(ALL.map(n => n.source).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">全部</option>' + sources.map(s => `<option>${esc(s)}</option>`).join("");
  sel.value = state.source;
  buildSourceColors();
  buildStockNames();
  renderWatchChips();
  renderStats();
  renderTape();
  renderCharts();
  render();
}

// 跑馬燈行情帶：個股代號 × 提及次數
function renderTape() {

function shareBar(el, entries, onClick) {
  const total = entries.reduce((s, e) => s + e[1], 0) || 1;
  const bar = entries.map(([name, cnt]) =>
    `<span data-name="${esc(name)}" title="${esc(name)} ${cnt} 則" style="width:${(cnt / total * 100).toFixed(2)}%;background:${sourceColor(name)}"></span>`).join("");
  const rows = entries.map(([name, cnt]) => {
    const pct = (cnt / total * 100).toFixed(1);
    const dim = state.source && state.source !== name ? " dim" : "";
    return `<div class="rank-row${dim}" data-name="${esc(name)}">
      <span class="swatch" style="background:${sourceColor(name)}"></span>
      <span class="rname">${esc(name)}</span>
      <span class="rcnt">${cnt} 則</span>
      <span class="rpct">${pct}%</span>
    </div>`;
  }).join("");
  el.innerHTML = `<div class="sharebar">${bar}</div><div class="rank">${rows}</div>`;
  el.querySelectorAll(".sharebar span, .rank-row").forEach(n =>
    n.addEventListener("click", () => onClick(n.dataset.name)));
}

function barChart(el, entries, onClick, labelFn) {
  const label = labelFn || (x => esc(x));
  const max = Math.max(1, ...entries.map(e => e[1]));
  el.innerHTML = entries.map(([name, cnt], i) =>
    `<div class="bar-row" data-name="${esc(name)}">
       <span class="name" title="${esc(name)}">${label(name)}</span>
       <span class="bar-track"><span class="bar-fill" style="width:${(cnt / max * 100).toFixed(1)}%;animation-delay:${i * 55}ms"></span></span>
       <span class="cnt">${cnt}</span>
     </div>`).join("") || '<div class="empty">無資料</div>';
  el.querySelectorAll(".bar-row").forEach(row => row.addEventListener("click", () => onClick(row.dataset.name)));
}

function fmtBucket(t, byHour) {
  const opts = byHour
    ? { timeZone: TZ, month: "2-digit", day: "2-digit", hour: "2-digit", hour12: false }
    : { timeZone: TZ, month: "2-digit", day: "2-digit" };
  return new Date(t).toLocaleString("zh-Hant", opts);
}
function renderTrend() {
  const el = document.getElementById("trendChart");
  const unitEl = document.getElementById("trendUnit");
  const times = ALL.map(n => parseTime(n.published_at)?.getTime()).filter(Boolean);
  if (!times.length) { el.innerHTML = '<div class="empty">無時間資料</div>'; unitEl.textContent = ""; return; }

  const byHour = (Math.max(...times) - Math.min(...times)) <= 48 * 3600 * 1000;
  const sources = Object.keys(SOURCE_COLORS);
  const buckets = new Map();
  ALL.forEach(n => {
    const t = parseTime(n.published_at)?.getTime();
    if (!t || !n.source) return;
    const key = fmtBucket(t, byHour);
    let b = buckets.get(key);
    if (!b) { b = { label: key, minT: t, total: 0, bySource: {} }; buckets.set(key, b); }
    b.minT = Math.min(b.minT, t); b.total++;
    b.bySource[n.source] = (b.bySource[n.source] || 0) + 1;
  });

  let cols = [...buckets.values()].sort((a, b) => a.minT - b.minT);
  const CAP = 24, truncated = cols.length > CAP;
  if (truncated) cols = cols.slice(-CAP);
  unitEl.textContent = (byHour ? "每小時" : "每日") + (truncated ? `・近 ${CAP} 格` : "");

  const maxTotal = Math.max(1, ...cols.map(c => c.total)), H = 150;
  const labelEvery = Math.ceil(cols.length / 12);
  const stacks = cols.map((c, i) => {
    const h = c.total / maxTotal * H;
    const segs = sources.filter(s => c.bySource[s]).map(s =>
      `<div class="trend-seg" title="${esc(s)} ${c.label}：${c.bySource[s]} 則" style="height:${(c.bySource[s] / c.total * h).toFixed(1)}px;background:${sourceColor(s)}"></div>`).join("");
    return `<div class="trend-col"><div class="trend-stack" style="height:${h.toFixed(1)}px;animation-delay:${i * 32}ms" title="${esc(c.label)}：共 ${c.total} 則">${segs}</div></div>`;
  }).join("");
  const labels = cols.map((c, i) =>
    `<span title="${esc(c.label)}">${(i % labelEvery === 0 || i === cols.length - 1) ? esc(c.label) : ""}</span>`).join("");
  el.innerHTML = `<div class="trend">${stacks}</div><div class="trend-x">${labels}</div>`;
}

// 統整風險新聞，找出被點名的個股股號
function computeRiskStocks() {
  const map = new Map(); // code -> {code, count, kw:Set}
  ALL.forEach(n => {
    const hits = newsRisk(n);
    if (!hits.length) return;
    (n.stocks || []).forEach(s => {
      const c = stockCode(s);
      let r = map.get(c);
      if (!r) { r = { code: c, count: 0, kw: new Set() }; map.set(c, r); }
      r.count++; hits.forEach(h => r.kw.add(h));
    });
  });
  return [...map.values()].sort((a, b) => b.count - a.count || b.kw.size - a.kw.size);
}
function renderRisk() {
  const el = document.getElementById("riskChart");
  const unit = document.getElementById("riskUnit");
  const risks = computeRiskStocks(); // 全部被點名的危險個股
  RISK_COUNT = risks.length;
  ALERT_COUNT = risks.filter(r => r.count >= RISK_MIN).length; // 達門檻 → 尖叫封頂
  if (!risks.length) {
    unit.textContent = "";
    el.innerHTML = '<div class="risk-empty">目前未偵測到含風險字詞且標註個股的新聞。</div>';
    return;
  }
  const alerts = risks.filter(r => r.count >= RISK_MIN).length;
  unit.textContent = `共 ${risks.length} 檔 · ${alerts} 檔達警示門檻 (≥ ${RISK_MIN} 則)`;
  const rows = risks.map((r, i) => {
    const kw = [...r.kw];
    const kwText = kw.slice(0, 6).join("、") + (kw.length > 6 ? ` +${kw.length - 6}` : "");
    const alert = r.count >= RISK_MIN;
    const badge = alert ? '<span class="badge">⚠ 警示</span>' : '<span class="badge watch">觀察</span>';
    return `<tr class="${alert ? "alert" : ""}" data-stock="${esc(r.code)}" style="animation-delay:${Math.min(i, 20) * 18}ms" title="點擊：篩選 ${esc(r.code)} 的新聞">
      <td class="idx">${i + 1}</td>
      <td><span class="code">${esc(r.code)}</span>${stockName(r.code) ? `<span class="code-name">${esc(stockName(r.code))}</span>` : ""}</td>
      <td class="num cnt">${r.count}</td>
      <td>${badge}</td>
      <td class="kw">${esc(kwText)}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<div class="risk-scroll"><table class="risk-table">
    <thead><tr><th>#</th><th>股號</th><th class="num">風險新聞</th><th>狀態</th><th>命中關鍵字</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  el.querySelectorAll("tbody tr").forEach(tr => tr.addEventListener("click", () => {
    state.stock = tr.dataset.stock; render();
    document.getElementById("list").scrollIntoView({ behavior: "smooth", block: "start" });
  }));
}

function applyFilters() {
  const q = state.q.trim().toLowerCase();
  const cutoff = state.range ? Date.now() - state.range * 3600 * 1000 : 0;
  let out = ALL.filter(n => {
    if (state.source && n.source !== state.source) return false;
    if (state.stock && !(n.stocks || []).some(s => stockCode(s) === state.stock)) return false;
    if (cutoff) { const t = parseTime(n.published_at); if (!t || t.getTime() < cutoff) return false; }
    if (state.riskOnly && !newsRisk(n).length) return false;
    if (state.watchOnly && !(n.stocks || []).some(s => inWatch(stockCode(s)))) return false;
    if (q) {
      // 比對原文＋雙語翻譯（中英都能搜）
      const hay = [n.title, n.summary, n.title_zh, n.title_en, n.summary_zh, n.summary_en]
        .filter(Boolean).join(" ").toLowerCase();
      // 也比對相關個股的代號與名稱（例如搜「台積電」可找到只標 2330 的新聞）
      const stockHay = (n.stocks || []).map(s => { const c = stockCode(s); return c + " " + stockName(c); }).join(" ").toLowerCase();
      if (!hay.includes(q) && !stockHay.includes(q)) return false;
    }
    return true;
  });
  out.sort((a, b) => {
    const ta = parseTime(a.published_at)?.getTime() || 0, tb = parseTime(b.published_at)?.getTime() || 0;
    return state.sort === "old" ? ta - tb : tb - ta;
  });
  return out;
}

  if (state.riskOnly) chips.push(["僅風險新聞", () => { state.riskOnly = false; document.getElementById("riskSel").value = "0"; }]);

function updateRankDim() {
  document.querySelectorAll("#sourceChart .rank-row").forEach(row =>
    row.classList.toggle("dim", !!state.source && row.dataset.name !== state.source));
}

function pageNumbers(cur, pages) {
  const want = new Set([1, pages, cur, cur - 1, cur + 1]);
  const arr = [...want].filter(p => p >= 1 && p <= pages).sort((a, b) => a - b);
  const res = []; let prev = 0;
  for (const p of arr) { if (p - prev > 1) res.push("…"); res.push(p); prev = p; }
  return res;
}
function renderPager(total, pages, startI, shown, unit = "則") {
  const pager = document.getElementById("pager");
  if (pages <= 1) {
    pager.innerHTML = total ? `<span class="pg-summary">共 ${total} ${unit}</span>` : "";
    return;
  }
  const btns = pageNumbers(state.page, pages).map(p => p === "…"
    ? '<span class="pg-gap">…</span>'
    : `<button class="pg-num${p === state.page ? " on" : ""}" data-p="${p}">${p}</button>`).join("");
  pager.innerHTML =
    `<button class="pg-nav" data-p="${state.page - 1}" ${state.page <= 1 ? "disabled" : ""}>‹ 上一頁</button>` +
    btns +
    `<button class="pg-nav" data-p="${state.page + 1}" ${state.page >= pages ? "disabled" : ""}>下一頁 ›</button>` +
    `<span class="pg-summary">第 ${startI + 1}–${startI + shown} ${unit} · 共 ${total} ${unit}</span>`;
  pager.querySelectorAll("button[data-p]").forEach(b => b.addEventListener("click", () => {
    if (b.disabled) return;
    state.page = +b.dataset.p; render();
    document.getElementById("list").scrollIntoView({ behavior: "smooth", block: "start" });
  }));
}

function wireTags(root) {

  }));
  root.querySelectorAll(".tag").forEach(el => el.addEventListener("click", e => {

// 點開高風險新聞 → 最恐怖的尖叫（強制最高強度）

// 個股彙整：把不同來源、講到同一支股票的新聞集中列出
const GROUP_PAGE_SIZE = 6;
function renderByStock(items, list, pager) {
  const groups = new Map();
  items.forEach(n => (n.stocks || []).forEach(s => {
    const c = stockCode(s);
    let g = groups.get(c);
    if (!g) { g = { code: c, items: [] }; groups.set(c, g); }
    g.items.push(n);
  }));
  const arr = [...groups.values()].sort((a, b) => b.items.length - a.items.length || a.code.localeCompare(b.code));
  if (!arr.length) {
    list.innerHTML = '<div class="empty">目前篩選結果裡沒有標註個股的新聞。</div>';
    pager.innerHTML = ""; return;
  }
  const pages = Math.max(1, Math.ceil(arr.length / GROUP_PAGE_SIZE));
  state.page = Math.min(Math.max(1, state.page), pages);
  const startI = (state.page - 1) * GROUP_PAGE_SIZE;
  const slice = arr.slice(startI, startI + GROUP_PAGE_SIZE);

  list.innerHTML = slice.map(g => {
    const nm = stockName(g.code);
    const its = g.items.slice().sort((a, b) => {
      const ta = parseTime(a.published_at)?.getTime() || 0, tb = parseTime(b.published_at)?.getTime() || 0;
      return state.sort === "old" ? ta - tb : tb - ta;
    });
    const srcs = [...new Set(its.map(it => it.source).filter(Boolean))];
    const articles = its.map((n, i) => articleHTML(n, i)).join("");
    return `<div class="stock-group">
      <div class="sg-head" data-stock="${esc(g.code)}" title="只看 ${esc(g.code)} 的新聞列表">
        <span class="sg-code">${esc(g.code)}</span>
        ${nm ? `<span class="sg-name">${esc(nm)}</span>` : ""}
        <span class="sg-count">${g.items.length} 則 · ${srcs.length} 來源</span>
        <span class="sg-srcs">${srcs.map(s => `<span>${esc(s)}</span>`).join("")}</span>
      </div>
      <div class="sg-items">${articles}</div>
    </div>`;
  }).join("");

  wireTags(list);
  wireRiskScream(list);
  list.querySelectorAll(".sg-head").forEach(h => h.addEventListener("click", () => {
    state.stock = h.dataset.stock; state.view = "list"; applyViewChrome(); render();
    document.getElementById("list").scrollIntoView({ behavior: "smooth", block: "start" });
  }));
  renderPager(arr.length, pages, startI, slice.length, "檔");
}

function render() {
  renderActiveFilters();
  updateRankDim();
  const items = applyFilters();
  renderDigest(items);
  // 篩選條件 / 檢視模式改變時回到第 1 頁（換頁本身不會觸發）
  const key = JSON.stringify([state.q, state.source, state.stock, state.range, state.sort, state.riskOnly, state.watchOnly, state.view, state.market]);
  if (key !== lastFilterKey) { state.page = 1; lastFilterKey = key; }

  const list = document.getElementById("list");
  const pager = document.getElementById("pager");
  if (!items.length) { list.innerHTML = '<div class="empty">沒有符合條件的新聞。</div>'; pager.innerHTML = ""; return; }

  if (state.view === "byStock") { renderByStock(items, list, pager); return; }

  const pages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
  state.page = Math.min(Math.max(1, state.page), pages);
  const startI = (state.page - 1) * PAGE_SIZE;
  const pageItems = items.slice(startI, startI + PAGE_SIZE);
  list.innerHTML = pageItems.map((n, i) => articleHTML(n, i)).join("");
  wireTags(list);
  wireRiskScream(list);
  renderPager(items.length, pages, startI, pageItems.length);
}

// ── 重點整理（規則式；AI 版若有則置頂）──
function computeDigest(items) {
  const byStock = new Map(); // code -> {code, count, latest, sources:Set, kw:Set}
  const kwCount = new Map();
  const srcSet = new Set();
  let minT = Infinity, maxT = -Infinity;
  items.forEach(n => {
    if (n.source) srcSet.add(n.source);
    const t = parseTime(n.published_at)?.getTime();
    if (t) { if (t < minT) minT = t; if (t > maxT) maxT = t; }
    const hits = newsRisk(n);
    hits.forEach(h => kwCount.set(h, (kwCount.get(h) || 0) + 1));
    (n.stocks || []).forEach(s => {
      const c = stockCode(s);
      let r = byStock.get(c);
      if (!r) { r = { code: c, count: 0, latest: null, latestT: -Infinity, sources: new Set(), kw: new Set() }; byStock.set(c, r); }
      r.count++;
      if (n.source) r.sources.add(n.source);
      hits.forEach(h => r.kw.add(h));
      if (t && t > r.latestT) { r.latestT = t; r.latest = n; }
      else if (!r.latest) r.latest = n;
    });
  });
  const stocks = [...byStock.values()].sort((a, b) => b.count - a.count || b.kw.size - a.kw.size);
  const keywords = [...kwCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10);
  return {
    total: items.length, stockCount: byStock.size, sourceCount: srcSet.size,
    minT: isFinite(minT) ? minT : null, maxT: isFinite(maxT) ? maxT : null,
    stocks, keywords,
  };
}

// AI 每股每日重點:summary.json.stocks → code → { date → summary }(相容舊的 points 格式)

// ── 重點整理內的近似去重:同一件事被多家報導、標題幾乎相同 → 折成一則 ──
function normTitle(t) {
  return String(t || "").toLowerCase()
    .replace(/^(快訊|獨家|盤中速報|盤後速報|即時|影音|直播|更新|nbsp|【[^】]*】)+/g, "")
    .replace(/[\s　]+/g, "")
    .replace(/[【】\[\]()（）〔〕「」『』:：,，。.、!！?？~～\-—–_｜|/／#*"'’“”]/g, "");
}
// 回傳去重後的代表新聞陣列:每筆 {n:代表新聞, srcs:來源集合, count:合併則數},依時間新到舊
function dedupeNews(list) {
  const reps = [];
  const bySig = new Map();
  const arr = list.slice().sort((a, b) => (parseTime(b.published_at)?.getTime() || 0) - (parseTime(a.published_at)?.getTime() || 0));
  for (const n of arr) {
    const sig = normTitle(dispTitle(n));
    if (!sig) { reps.push({ n, srcs: new Set([n.source].filter(Boolean)), count: 1, sig: "" }); continue; }
    let hit = bySig.get(sig);
    if (!hit) hit = reps.find(r => r.sig && (r.sig.includes(sig) || sig.includes(r.sig)) && Math.min(r.sig.length, sig.length) >= 8);
    if (hit) { hit.count++; if (n.source) hit.srcs.add(n.source); }
    else { const r = { n, srcs: new Set([n.source].filter(Boolean)), count: 1, sig }; reps.push(r); bySig.set(sig, r); }
  }
  return reps;
}
function dupBadge(r) {
  return r.count > 1 ? `<span class="h-dup" title="${esc([...r.srcs].join("、"))}">· ${r.srcs.size || r.count} 來源</span>` : "";
}

// ── 規則式每股重點:把一支股票的新聞內容去套語、抽關鍵句、去重,濃縮成一小段 ──
function stripBoiler(t) {
  return String(t || "")
    .replace(/[（(]\s*中央社[^）)]*[）)]/g, "")
    .replace(/[（(]\s*[^）)]{0,14}[／/][^）)]{0,10}報導\s*[）)]/g, "")
    .replace(/(綜合外電報導|綜合報導|編譯[^，。]{0,6}報導|路透社?|彭博資訊?|法新社|美聯社|中央社)/g, "")
    .replace(/(本文|以上)?(內容|資訊)?不構成(任何)?投資(建議|參考)[^。]*。?/g, "")
    .replace(/更多[^。]{0,20}(請見|詳見|內容)[^。]*。?/g, "")
    .replace(/\|\s*Anue[^。]*$/g, "")
    .trim();
}
function splitSentences(t) {
  return String(t || "").split(/[。！？\n;；]+/).map(s => s.trim()).filter(s => s.length >= 8);
}
const _KP_NUM = /[0-9０-９]|％|%|元|億|萬|張|點|漲停|跌停|漲|跌|填息|除息|除權|營收|年增|季增|月增|獲利|虧損|EPS|目標價|評等|法說|配息|股利|創新高|新高|新低/i;
// dayItems: 該股某日新聞;回傳一小段濃縮重點(最多 3 句)。
// 只抽「有提到該股名稱或代號」的句子 → 真的有個股專屬內容才給重點,否則回傳空(改顯示標題)。
function extractKeyPoints(dayItems, code, name) {
  const dd = dedupeNews(dayItems);
  const cand = [], seen = new Set();
  dd.forEach(r => {
    const n = r.n;
    // 標題與摘要都納入來源(標題常是最精華的一句)
    const text = stripBoiler(dispTitle(n)) + "。" + stripBoiler(dispSummary(n));
    splitSentences(text).forEach(s => {
      const mentions = (name && name.length >= 2 && s.includes(name)) || (code && s.includes(code));
      if (!mentions) return; // 沒點到本股 → 不是個股專屬重點,略過
      const key = s.replace(/\s+/g, "").slice(0, 30);
      if (seen.has(key)) return; seen.add(key);
      let score = 1;
      if (_KP_NUM.test(s)) score += 2;
      if (s.length >= 14 && s.length <= 90) score += 1;
      cand.push({ s, score });
    });
  });
  cand.sort((a, b) => b.score - a.score);
  const picked = [];
  for (const c of cand) {
    if (picked.length >= 3) break;
    if (picked.some(p => p.slice(0, 12) === c.s.slice(0, 12))) continue; // 去掉開頭雷同的重複句
    picked.push(c.s);
  }
  return picked.length ? picked.join("。") + "。" : "";
}

// 規則式事件聚類:從標題抽取關鍵詞(中文 2~4 字窗 + 英文詞),依共現聚成主題
const EVENT_STOP = new Set([
  "台股","美股","公司","今日","今天","昨天","盤中","早盤","午盤","尾盤","開盤","收盤","盤後","盤前",
  "分析","報導","新聞","消息","快訊","速報","市場","法人","投資","股價","大盤","指數","表現","持續",
  "可能","表示","指出","一度","上漲","下跌","走高","走低","成長","衰退","營收","月營收","財報","獲利","宣布",
  "第一","第二","第三","第四","億元","萬元","衝擊","影響","相關","概念","族群","類股","漲停","跌停",
  "年增","月增","年減","月減","季增","季減","新高","新低","歷史","創新","刷新","締新","焦點","焦點股",
  "上半年","下半年","全年","單季","累計","亮燈","抱團","反彈","回檔","續漲","續跌","收漲","收跌","大漲","大跌",
  "個股","買超","賣超","外資","投信","自營","三大","法說","除息","除權","填息","股利","配息",
  "the","and","for","with","that","this","from","says","will","new","after","amid","stocks","market",
  "report","update","today","week","year","amid","says","stock","shares","earnings","results"
]);
function eventTerms(title) {
  const terms = new Set();
  (title.match(/[一-龥]{2,}/g) || []).forEach(run => {
    for (let len = 4; len >= 2; len--)
      for (let i = 0; i + len <= run.length; i++) {
        const t = run.slice(i, i + len);
        if (!EVENT_STOP.has(t)) terms.add(t);
      }
  });
  (title.match(/[A-Za-z][A-Za-z0-9]{2,}/g) || []).forEach(w => { const lw = w.toLowerCase(); if (!EVENT_STOP.has(lw)) terms.add(lw); });
  return terms;
}
function computeEventClustersRule(items) {
  const arr = items.slice(0, 1500); // 限制掃描量
  const df = new Map(); // term -> Set(index)
  arr.forEach((n, i) => eventTerms(dispTitle(n) || "").forEach(term => {
    let s = df.get(term); if (!s) { s = new Set(); df.set(term, s); } s.add(i);
  }));
  const STOP_ARR = [...EVENT_STOP];
  const common2 = Math.max(3, arr.length * 0.12); // 2 字詞若太常見多半是泛用詞,略過
  const cands = [...df.entries()]
    .filter(([term, s]) => s.size >= 2
      && !(term.length === 2 && s.size > common2)               // 過於常見的 2 字詞
      && !STOP_ARR.some(sw => term.includes(sw) || sw.includes(term))) // 含停用詞或為其片段 → 略過,偏向專有名詞
    .map(([term, idx]) => ({ term, idx, score: idx.size * term.length }))
    .sort((a, b) => b.score - a.score);
  const chosen = [];
  for (const c of cands) {
    if (chosen.length >= 8) break;
    let dup = false;
    for (const ch of chosen) {
      const inter = [...c.idx].filter(i => ch.idx.has(i)).length;
      const uni = new Set([...c.idx, ...ch.idx]).size;
      if ((uni && inter / uni > 0.6) || (inter >= c.idx.size * 0.9 && c.idx.size <= ch.idx.size)) { dup = true; break; }
    }
    if (!dup) chosen.push(c);
  }
  return chosen.map(c => {
    const its = [...c.idx].map(i => arr[i]).sort((a, b) => (parseTime(b.published_at)?.getTime() || 0) - (parseTime(a.published_at)?.getTime() || 0));
    const stocks = new Set(); its.forEach(n => (n.stocks || []).forEach(s => stocks.add(stockCode(s))));
    return { term: c.term, items: its, stocks };
  });
}

let _netBusy = false;

async function hsgSearch() {
  if (_netBusy) return;
  const inp = document.getElementById("netInput");
  const box = document.getElementById("netResults");
  const q = (inp.value || "").trim();
  if (!q) { box.innerHTML = ""; return; }
  _netBusy = true; box.innerHTML = '<div class="net-note">搜尋中…</div>';
  try {
    const r = await fetch("api/hsg/search?q=" + encodeURIComponent(q) + "&n=10");
    const d = await r.json();
    if (d.error) { box.innerHTML = `<div class="net-note" style="color:#ff7a92">${esc(d.error)}</div>`; return; }
    const items = d.results || [];
    if (!items.length) { box.innerHTML = '<div class="net-note">沒有結果。</div>'; return; }
    box.innerHTML = items.map(it => `<div class="net-item">
      <div class="n-title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title || it.url)}</a></div>
      <div class="n-url">${esc(it.url)}</div>
      ${it.snippet ? `<div class="n-snip">${esc(it.snippet)}</div>` : ""}
      <div class="n-crawl"><button data-url="${esc(it.url)}">📄 爬正文</button></div>
    </div>`).join("");
    box.querySelectorAll(".n-crawl button").forEach(btn => btn.addEventListener("click", () => hsgFetch(btn)));
  } catch (e) {
    box.innerHTML = '<div class="net-note" style="color:#ff7a92">無法連到本機 HSG 後端。請在專案根目錄執行 <code>python serve.py</code>,再從 http://localhost:8000 開啟看板(GitHub Pages 無此功能)。</div>';
  } finally { _netBusy = false; }
}
async function hsgFetch(btn) {
  const url = btn.dataset.url;
  const item = btn.closest(".net-item");
  const existing = item.querySelector(".n-body");
  if (existing) { existing.remove(); return; } // 再按一次收合
  const body = document.createElement("div");
  body.className = "n-body"; body.textContent = "爬取中…"; item.appendChild(body);
  btn.disabled = true;
  try {
    const r = await fetch("api/hsg/fetch?url=" + encodeURIComponent(url) + "&max_chars=6000");
    const d = await r.json();
    if (d.error) { body.className = "n-body err"; body.textContent = d.error; }
    else { body.className = "n-body"; body.textContent = d.text || "(無正文)"; }
  } catch (e) {
    body.className = "n-body err"; body.textContent = "爬取失敗:無法連到本機 HSG 後端(需 python serve.py)。";
  } finally { btn.disabled = false; }
}

// ── 風格切換（霓虹光害 ⇄ 極光玻璃）──
const THEMES = ["fx-neon", "fx-gold", "fx-china"];
const THEME_LABEL = { "fx-neon": "🔆 霓虹光害", "fx-gold": "👑 鎏金奢華", "fx-china": "🏮 中國風" };

// 切到霓虹風格時的合成尖叫（Web Audio，無外部音檔）
let _audioCtx = null;
let _muted = false;
let RISK_COUNT = 0;  // 目前有風險的股票檔數（由 renderRisk 更新）
let ALERT_COUNT = 0; // 達警示門檻 (≥ RISK_MIN 則) 的股票檔數
// 只要有任一檔達警示門檻 → 強度直接封頂 (1)；否則用較低基準
function screamIntensity() { return ALERT_COUNT > 0 ? 1 : Math.min(0.5, RISK_COUNT / 20); }
function playScream(forceK) {

    _audioCtx = _audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;

    const peak = 0.5 + 0.5 * k;           // 達警示門檻時音量封頂

    const comp = ctx.createDynamicsCompressor();

    const master = ctx.createGain();

    master.gain.exponentialRampToValueAtTime(peak, now + 0.02);
    master.gain.setValueAtTime(peak * 0.92, now + dur - 0.3);
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    // 更狠的硬削波撕裂失真
    const shaper = ctx.createWaveShaper();
    const curve = new Float32Array(1024);
    for (let i = 0; i < 1024; i++) { const x = i / 512 - 1; curve[i] = Math.tanh(x * 10); }
    shaper.curve = curve; shaper.oversample = "4x";
    const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 3200; bp.Q.value = 10;
    const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1100;
    // 金屬回授延遲尾音
    const delay = ctx.createDelay(); delay.delayTime.value = 0.07;
    const fb = ctx.createGain(); fb.gain.value = 0.55;
    shaper.connect(bp); bp.connect(hp);
    hp.connect(master);

    master.connect(comp); comp.connect(ctx.destination);

    const lfo = ctx.createOscillator(), lfoGain = ctx.createGain();

    const base = 1100 + Math.random() * 600;
    const allMults = [0.5, 1, 1.414, 1.5, 1.888, 2.0, 2.667, 3.0, 3.78, 4.5];
    const nVoices = 3 + Math.round(k * (allMults.length - 3)); // 風險越多 → 音層越多
    allMults.slice(0, nVoices).forEach(mult => {
      const f = base * mult;
      const o = ctx.createOscillator();
      o.type = "sawtooth";
      o.detune.value = (Math.random() * 2 - 1) * 30;
      o.frequency.setValueAtTime(f, now);
      o.frequency.exponentialRampToValueAtTime(f * 2.2, now + 0.14);
      o.frequency.exponentialRampToValueAtTime(f * 0.8, now + dur);
      lfoGain.connect(o.frequency);
      const g = ctx.createGain(); g.gain.value = 0.32;
      o.connect(g); g.connect(shaper);
      o.start(now); o.stop(now + dur);
    });

    // 雙層白噪（高頻嘶吼 + 中頻轟鳴）
    [3500, 700].forEach(hz => {
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;

      const nf = ctx.createBiquadFilter(); nf.type = "highpass"; nf.frequency.value = hz;

  } catch (e) { /* 忽略：不支援或被靜音 */ }

// 連續尖叫：每段約 1 秒，略為重疊以避免空檔
let _screamTimer = null;
function screamInterval() { return Math.round(820 - 520 * screamIntensity()); } // 達門檻時最密集（~300ms）
function startScreaming() {
  if (_muted || _screamTimer) return;
  const tick = () => { playScream(); _screamTimer = setTimeout(tick, screamInterval()); };
  tick();
}
function stopScreaming() {
  if (_screamTimer) { clearTimeout(_screamTimer); _screamTimer = null; }
}

// ── 鎏金奢華：合成「很吵又熱鬧」的電音循環（Web Audio,零依賴,無外部音檔）──
let _musicTimer = null, _musicStep = 0, _musicNext = 0;
let _mGain = null, _mComp = null, _noiseBuf = null, _mShaper = null, _mOut = null;
const _BPM = 124, _STEP = 60 / 124 / 4; // 16 分音符秒數
// 失真曲線:amount 越大越兇
function _distCurve(amount) {
  const n = 2048, c = new Float32Array(n), k = amount;
  for (let i = 0; i < n; i++) { const x = i * 2 / n - 1; c[i] = (3 + k) * x * 20 * Math.PI / 180 / (Math.PI + k * Math.abs(x)); }
  return c;
}
function _mf(m) { return 440 * Math.pow(2, (m - 69) / 12); } // MIDI→Hz
// 4 小節和弦進行（Am–F–C–G):root 低音 + 高音琶音三音
const _CHORDS = [
  { root: 45, arp: [69, 72, 76] }, // Am
  { root: 41, arp: [65, 69, 72] }, // F
  { root: 48, arp: [72, 76, 79] }, // C
  { root: 43, arp: [67, 71, 74] }, // G
];
function _musicGraph(ctx) {
  if (_mComp) return;
  // 訊號鏈:voices → _mGain(過載驅動) → _mShaper(失真) → _mComp(轟大聲) → _mOut → 喇叭
  _mGain = ctx.createGain(); _mGain.gain.value = 4.5;          // 過載驅動:推爆失真 → 更兇更爆
  _mShaper = ctx.createWaveShaper(); _mShaper.curve = _distCurve(950); _mShaper.oversample = "4x"; // 超重失真
  _mComp = ctx.createDynamicsCompressor();
  _mComp.threshold.value = -32; _mComp.ratio.value = 20; _mComp.attack.value = 0.0005; _mComp.release.value = 0.08; // 磚牆最大化 → 音爆
  _mOut = ctx.createGain(); _mOut.gain.value = 1.35;
  _mGain.connect(_mShaper); _mShaper.connect(_mComp); _mComp.connect(_mOut); _mOut.connect(ctx.destination);

  const d = _noiseBuf.getChannelData(0); for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
}
function _kick(ctx, t) { const o = ctx.createOscillator(), g = ctx.createGain(); o.type = "sine"; o.frequency.setValueAtTime(135, t); o.frequency.exponentialRampToValueAtTime(45, t + 0.12); g.gain.setValueAtTime(1.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.24); o.connect(g); g.connect(_mGain); o.start(t); o.stop(t + 0.26); }
function _hat(ctx, t) { const s = ctx.createBufferSource(); s.buffer = _noiseBuf; const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7500; const g = ctx.createGain(); g.gain.setValueAtTime(0.32, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.045); s.connect(hp); hp.connect(g); g.connect(_mGain); s.start(t); s.stop(t + 0.06); }
function _clap(ctx, t) { const s = ctx.createBufferSource(); s.buffer = _noiseBuf; const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 1700; bp.Q.value = 0.7; const g = ctx.createGain(); g.gain.setValueAtTime(0.7, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18); s.connect(bp); bp.connect(g); g.connect(_mGain); s.start(t); s.stop(t + 0.2); }
function _bass(ctx, t, freq, dur) { const o = ctx.createOscillator(), o2 = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter(); o.type = "sawtooth"; o2.type = "sawtooth"; o.frequency.value = freq; o2.frequency.value = freq; o2.detune.value = 18; f.type = "lowpass"; f.frequency.value = 1200; f.Q.value = 6; g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.72, t + 0.006); g.gain.exponentialRampToValueAtTime(0.001, t + dur); o.connect(f); o2.connect(f); f.connect(g); g.connect(_mGain); o.start(t); o2.start(t); o.stop(t + dur + 0.02); o2.stop(t + dur + 0.02); }

// ── 中國風：合成古風背景樂（五聲音階古琴 + 迴音,Web Audio,零依賴)──
let _cnTimer = null, _cnStep = 0, _cnNext = 0, _cnGain = null;

// C 大調五聲音階(宮商角徵羽)旋律,MIDI

  69, 67, 64, 67, 72, 69, 67, 64, 62, 64, 67, 69, 67, 64, 62, 60,
  64, 67, 69, 72, 69, 67, 64, 67, 62, 60, 62, 64, 67, 69, 67, 64,

function _cnGraph(ctx) {
  if (_cnGain) return;
  _cnGain = ctx.createGain(); _cnGain.gain.value = 0.6;

function _guqin(ctx, t, freq) {

  const ctx = _audioCtx; if (!ctx) return;
