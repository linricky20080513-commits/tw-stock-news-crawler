}

function applyTheme(t) {
  if (!THEMES.includes(t)) t = "fx-neon";
  document.body.classList.remove(...THEMES);
  document.body.classList.add(t);
  document.getElementById("themeToggle").textContent = THEME_LABEL[t];
  try { localStorage.setItem("dashTheme", t); } catch (e) {}
}
try { _muted = localStorage.getItem("dashMuted") === "1"; } catch (e) {}
const _muteBtn = document.getElementById("muteToggle");
_muteBtn.textContent = _muted ? "🔇" : "🔊";
_muteBtn.addEventListener("click", () => setMuted(!_muted));

let savedTheme = "fx-neon";
try { savedTheme = localStorage.getItem("dashTheme") || "fx-neon"; } catch (e) {}
applyTheme(savedTheme);
document.getElementById("themeToggle").addEventListener("click", () => {
  const cur = THEMES.find(t => document.body.classList.contains(t)) || "fx-neon";
  const next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length]; // 霓虹 → 鎏金 → 中國風 → …
  applyTheme(next);
  applyThemeAudio(next);
});
// 首次互動時,若目前是鎏金/中國風且未靜音 → 啟動背景樂(繞過瀏覽器自動播放限制)
function _musicOnGesture() {
  if (!_muted) {
    if (document.body.classList.contains("fx-gold")) startGoldMusic();
    else if (document.body.classList.contains("fx-china")) startChinaMusic();
  }
  window.removeEventListener("pointerdown", _musicOnGesture);
  window.removeEventListener("keydown", _musicOnGesture);
}
window.addEventListener("pointerdown", _musicOnGesture);
window.addEventListener("keydown", _musicOnGesture);

// 市場初始化（讀取上次選擇）
try { state.market = localStorage.getItem("dashMarket") === "us" ? "us" : "tw"; } catch (e) {}
applyMarketChrome();
document.getElementById("marketToggle").addEventListener("click", () => setMarket(state.market === "tw" ? "us" : "tw"));

try { state.lang = localStorage.getItem("dashLang") === "en" ? "en" : "zh"; } catch (e) {}
applyLangChrome();
document.getElementById("langToggle").addEventListener("click", () => setLang(state.lang === "zh" ? "en" : "zh"));

try { state.view = localStorage.getItem("dashView") === "byStock" ? "byStock" : "list"; } catch (e) {}
applyViewChrome();
document.getElementById("viewToggle").addEventListener("click", () => setView(state.view === "list" ? "byStock" : "list"));

// ── 自選股 / 重點整理 初始化與事件 ──
try { state.watchOnly = localStorage.getItem("dashWatchOnly") === "1"; } catch (e) {}
try { state.digest = localStorage.getItem("dashDigest") === "1"; } catch (e) {}
applyWatchChrome();
applyDigestChrome();
try { const dg = localStorage.getItem("dashDigestGroup"); if (["overview", "byStock", "byEvent"].includes(dg)) state.digestGroup = dg; } catch (e) {}
document.getElementById("watchToggle").addEventListener("click", () => setWatchOnly(!state.watchOnly));
document.getElementById("digestToggle").addEventListener("click", () => setDigest(!state.digest));
document.querySelectorAll("#dgSeg button").forEach(b => b.addEventListener("click", () => setDigestGroup(b.dataset.g)));

try { state.analytics = localStorage.getItem("dashAnalytics") === "1"; } catch (e) {}
applyAnalyticsChrome();
document.getElementById("analyticsToggle").addEventListener("click", () => setAnalytics(!state.analytics));

try { state.net = localStorage.getItem("dashNet") === "1"; } catch (e) {}
document.getElementById("netPanel").hidden = !state.net;
applyNetChrome();
document.getElementById("netToggle").addEventListener("click", () => setNet(!state.net));
document.getElementById("netSearch").addEventListener("click", hsgSearch);
document.getElementById("netInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); hsgSearch(); } });
document.getElementById("watchManage").addEventListener("click", () => {
  const p = document.getElementById("wlPanel"); p.hidden = !p.hidden;
  document.getElementById("watchManage").classList.toggle("on", !p.hidden);
  if (!p.hidden) { renderWatchChips(); document.getElementById("wlInput").focus(); }
});
function wlAddFromInput() {
  const inp = document.getElementById("wlInput");
  const v = inp.value.trim();
  if (!v) return;
  // 支援一次貼多筆（空白 / 逗號 / 頓號 分隔）
  v.split(/[\s,、，]+/).filter(Boolean).forEach(tok => watchAdd(tok));
  inp.value = ""; renderWatchChips(); render();
}
document.getElementById("wlAdd").addEventListener("click", wlAddFromInput);
document.getElementById("wlInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); wlAddFromInput(); } });
document.getElementById("wlReset").addEventListener("click", () => { watchResetSeed(); renderWatchChips(); render(); });
document.getElementById("wlClear").addEventListener("click", () => { watchClear(); renderWatchChips(); render(); });

// 每 5 分鐘自動重新載入新聞（與背景爬蟲同步）
const AUTO_REFRESH_MS = 5 * 60 * 1000;
load();
setInterval(load, AUTO_REFRESH_MS);
</script>
</body>
</html>
